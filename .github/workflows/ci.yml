name: MLOps CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      # Step 1 - Download repository
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2 - Install Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3 - Install Python packages
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4 - Verify Python syntax
      - name: Verify Imports
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/model.py
          python -m py_compile app/schemas.py

      # Step 5 - Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t mlops-platform:latest .

      # Step 6 - Verify Docker Image Exists
      - name: List Docker Images
        run: docker images
      # Step 7 - ******Testing Docker Container******
      - name: Run Docker Container
        run: |
          docker run -d --name mlops-app -p 8000:8000 mlops-platform:latest

      - name: Wait for app to start
        run: sleep 5

      - name: Test Health Endpoint
        run: |
          curl --fail http://localhost:8000/health  